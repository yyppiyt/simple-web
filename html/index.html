<!DOCTYPE html>
<html>

<head>
    <title>Synology API + Database Test</title>
</head>

<body>
    <h1>API Test</h1>
    <button onclick="callApi()">Call API</button>
    <pre id="result"></pre>
    <button onclick="callEcho()">Call Echo</button>
    <pre id="result2"></pre>

    <h1>Messages</h1>
    <input id="name" placeholder="Name">
    <input id="message" placeholder="Message">
    <button onclick="addMessage()">Add Message</button>

    <pre id="message_result"></pre>



    <script>
        async function callApi() {
            const res = await fetch("/api/hello");
            const data = await res.json();
            document.getElementById("result").textContent =
                JSON.stringify(data, null, 2);
        }
        async function callEcho() {
            fetch("/api/echo", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: "Tom",
                    message: "Hello"
                })
            })
                .then(res => res.json())
                .then(data =>
                    document.getElementById("result2").textContent = JSON.stringify(data, null, 2)
                );
        }

        async function loadMessages() {
            const res = await fetch("/api/messages");
            const data = await res.json();
            document.getElementById("message_result").textContent =
                JSON.stringify(data, null, 2);
        }

        async function addMessage() {
            const name = document.getElementById("name").value;
            const message = document.getElementById("message").value;

            await fetch("/api/messages", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name, message })
            });

            await loadMessages();
        }

        loadMessages();
    </script>
</body>

</html>
