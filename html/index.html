<!DOCTYPE html>
<html lang="en" class="auth-pending" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#071426">
    <title>Simple Web</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="session-loading" role="status" aria-live="polite">Checking session...</div>

    <div class="page-shell">
        <header class="topbar">
            <div>
                <h1>Simple Web</h1>
                <p>Message board</p>
            </div>
            <div class="session">
                <span id="user-status"></span>
                <a class="nav-button" href="/settings">Settings</a>
                <button
                    class="theme-toggle"
                    data-theme-toggle
                    type="button"
                    role="switch"
                    aria-checked="true"
                    aria-label="Dark mode"
                    title="Switch to light mode"
                >
                    <span class="theme-toggle-track" aria-hidden="true">
                        <span class="theme-toggle-thumb"></span>
                    </span>
                    <span>Dark mode</span>
                </button>
                <button id="logout-button" class="secondary" type="button">Logout</button>
            </div>
        </header>

        <main class="layout">
            <section id="message-panel" class="panel message-panel">
                <h2>New Message</h2>
                <form id="message-form" class="form-stack">
                    <label>
                        Message
                        <textarea id="message" maxlength="1000" placeholder="Write something..."></textarea>
                    </label>
                    <div class="button-row">
                        <button type="submit">Add Message</button>
                        <button id="refresh-button" class="secondary" type="button">Refresh</button>
                    </div>
                    <p id="message-status" class="status" role="status" aria-live="polite"></p>
                </form>
            </section>

            <section class="panel messages">
                <h2>Messages</h2>
                <ul id="message-list" class="message-list"></ul>
            </section>

            <section class="panel api-checks">
                <h2>API Checks</h2>
                <div class="api-grid">
                    <div class="form-stack">
                        <button id="hello-button" class="secondary" type="button">Call API</button>
                        <pre id="result"></pre>
                    </div>
                    <div class="form-stack">
                        <button id="echo-button" class="secondary" type="button">Call Echo</button>
                        <pre id="result2"></pre>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="session.js"></script>
    <script src="index.js"></script>
</body>

</html>
