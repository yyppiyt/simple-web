<!DOCTYPE html>
<html lang="en" class="auth-pending" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#071426"><title>Set up 2FA | Simple Web</title><script src="theme.js"></script><link rel="stylesheet" href="index.css"></head>
<body>
    <div class="session-loading" role="status">Checking session...</div>
    <div class="page-shell">
        <header class="topbar"><div><h1>Two-factor authentication</h1><p>Account security</p></div><div class="session"><span id="user-status"></span><a class="nav-button" href="/settings">Settings</a><button class="theme-toggle" data-theme-toggle type="button" role="switch" aria-checked="true"><span class="theme-toggle-track"><span class="theme-toggle-thumb"></span></span><span>Dark mode</span></button></div></header>
        <main class="settings-layout">
            <section id="setup-panel" class="panel settings-panel" aria-labelledby="setup-title">
                <div class="settings-heading"><p class="eyebrow">Authenticator app</p><h2 id="setup-title">Set up 2FA</h2><p>Scan the QR code, or copy the seed into your authenticator app. Then enter a code to confirm.</p></div>
                <div id="setup-content" class="form-stack" hidden>
                    <img id="qr-code" class="qr-code" alt="TOTP setup QR code">
                    <div class="form-field"><label>Setup seed</label><div class="seed-row"><output id="seed" class="seed-value"></output><button id="copy-seed" class="secondary" type="button">Copy seed</button></div></div>
                    <form id="enable-form" class="form-stack"><div class="form-field"><label for="enable-code">Verification code</label><input id="enable-code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required></div><div class="button-row"><button type="submit">Enable 2FA</button></div></form>
                </div>
                <div id="disabled-actions" class="button-row"><button id="start-setup" type="button">Set up authenticator</button></div>
                <form id="disable-form" class="form-stack" hidden><div class="form-field"><label for="disable-code">Current verification code</label><input id="disable-code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required></div><div class="button-row"><button type="submit" class="secondary">Disable 2FA</button></div></form>
                <p id="two-factor-status" class="status" role="status" aria-live="polite"></p>
            </section>
        </main>
    </div>
    <script src="session.js"></script><script src="two-factor-setup.js"></script>
</body></html>
