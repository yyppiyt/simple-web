services:
  web:
    image: nginx:stable-alpine
    container_name: simple-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /volume1/docker/simple-web/html:/usr/share/nginx/html:ro
      - /volume1/docker/simple-web/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  api:
    build: ./api
    container_name: simple-api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: simpleuser
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: simpledb
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    container_name: simple-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: simpleuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: simpledb
    volumes:
      - /volume1/docker/simple-web/db/postgres:/var/lib/postgresql
      - /volume1/docker/simple-web/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U simpleuser -d simpledb" ]
      interval: 10s
      timeout: 5s
      retries: 5
